name: Tabhi Group Competitor News Scraper

on:
  repository_dispatch:
    types: [trigger-scraper]
  workflow_dispatch: # Allows manual trigger from the GitHub web UI as well
  schedule:
    - cron: '0 0 * * *' # Runs every 24 hours (daily at 00:00 UTC)

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Scraper Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r News_Intelligence/requirements.txt

      - name: Run Scraper Pipeline
        run: |
          cd News_Intelligence
          python src/main.py

      - name: Commit and Push Updated Excel Databases
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add News_Dashboard/data/
          git add News_Intelligence/output/
          # Commit only if there are changes
          git diff-index --quiet HEAD || git commit -m "Auto-update competitor news databases"
          git push
