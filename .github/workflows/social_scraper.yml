name: Tabhi Group Competitor Social Scraper

on:
  repository_dispatch:
    types: [trigger-social-scraper]
  workflow_dispatch:

jobs:
  run-social-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r News_Intelligence/requirements.txt

      - name: Run Social Scraper Pipeline
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          cd News_Intelligence
          python src/social_media/social_orchestrator.py

      - name: Commit and Push Updated Excel Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add News_Dashboard/data/social_media_posts.xlsx
          git diff-index --quiet HEAD || git commit -m "Auto-update competitor social media database"
          git pull --rebase -X ours
          git push
