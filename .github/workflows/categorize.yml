name: Categorize News

on:
  repository_dispatch:
    types: [trigger-categorizer]
  workflow_dispatch:

jobs:
  categorize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r News_Intelligence/requirements.txt
          
      - name: Run Categorizer Job
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          MODEL_NAME: ${{ vars.MODEL_NAME || 'gpt-oss:20b-cloud' }}
        run: |
          python News_Intelligence/src/categorizer_job.py
          
      - name: Commit and Push Updated Excel Databases
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add News_Dashboard/data/ News_Intelligence/output/
          git diff-index --quiet HEAD || git commit -m "Auto-categorize news databases"
          git pull --rebase -X ours
          git push
